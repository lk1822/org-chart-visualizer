<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Chart Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f5f6f8;
    color: #1a202c;
    overflow: auto;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .legend { display: flex; gap: 18px; font-size: 13px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls button {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .controls button:hover { background: rgba(255,255,255,0.25); }
  .search-box {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 13px;
    width: 200px;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.6); }
  .search-box:focus { outline: none; background: rgba(255,255,255,0.25); }

  .stats-bar {
    display: flex; gap: 24px; padding: 12px 32px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
    font-size: 13px;
    color: #4a5568;
    flex-wrap: wrap;
  }
  .stat { display: flex; gap: 4px; }
  .stat strong { color: #1a202c; }

  /* ===== UPLOAD ZONE ===== */
  .upload-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 40px;
  }
  .upload-zone {
    border: 3px dashed #cbd5e0;
    border-radius: 20px;
    padding: 60px 80px;
    text-align: center;
    background: white;
    transition: all 0.3s;
    max-width: 560px;
    width: 100%;
    cursor: pointer;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: #3b82f6;
    background: #eff6ff;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(59,130,246,0.12);
  }
  .upload-zone.drag-over { border-color: #2563eb; background: #dbeafe; }
  .upload-icon {
    width: 72px; height: 72px; margin: 0 auto 20px;
    background: #eff6ff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .upload-zone h2 { font-size: 20px; font-weight: 600; color: #1e3a5f; margin-bottom: 8px; }
  .upload-zone p { font-size: 14px; color: #718096; margin-bottom: 20px; line-height: 1.5; }
  .upload-btn {
    display: inline-block;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .upload-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
  .upload-hint {
    margin-top: 16px;
    font-size: 12px;
    color: #a0aec0;
  }
  .upload-hint code {
    background: #f0f4f8;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
  }
  #fileInput { display: none; }

  /* ===== RELOAD BUTTON ===== */
  .reload-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .reload-btn:hover { background: rgba(255,255,255,0.25); }

  /* ===== ERROR ===== */
  .error-msg {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #991b1b;
    padding: 12px 20px;
    border-radius: 8px;
    margin: 20px 32px;
    font-size: 14px;
  }

  /* ===== CHART ===== */
  .chart-container { padding: 32px; overflow: auto; }

  .tree ul {
    list-style: none;
    padding-left: 0;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .tree-li {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    position: relative;
    padding: 3px 0;
  }
  .tree-li > ul { padding-left: 28px; position: relative; }
  .tree-li > ul::before {
    content: '';
    position: absolute;
    left: 14px; top: 0; bottom: 0;
    width: 2px;
    background: #d0d5dd;
  }
  .tree-li > ul > .tree-li::before {
    content: '';
    position: absolute;
    left: -14px; top: 22px;
    width: 14px; height: 2px;
    background: #d0d5dd;
  }
  .tree-li > ul > .tree-li:first-child::after {
    content: '';
    position: absolute;
    left: -14px; top: 0; height: 22px;
    width: 2px;
    background: #f5f6f8;
    z-index: 1;
  }
  .tree-li > ul > .tree-li:last-child::after {
    content: '';
    position: absolute;
    left: -14px; top: 24px; bottom: 0;
    width: 2px;
    background: #f5f6f8;
    z-index: 1;
  }
  .tree > ul > .tree-li::before,
  .tree > ul > .tree-li::after { display: none; }
  .tree > ul::before { display: none; }

  .node {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 10px;
    padding: 7px 14px;
    cursor: default;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    flex-shrink: 0;
    border-left: 4px solid;
  }
  .node:hover { transform: translateX(2px); }
  .node.highlight { box-shadow: 0 0 0 3px #facc15, 0 4px 16px rgba(250,204,21,0.35) !important; }

  /* US = Blue */
  .node.loc-us {
    background: #eff6ff;
    border-left-color: #3b82f6;
    box-shadow: 0 1px 4px rgba(59,130,246,0.1);
  }
  .node.loc-us:hover { box-shadow: 0 4px 16px rgba(59,130,246,0.18); }
  .node.loc-us .node-title { color: #6b7fa8; }
  .node.loc-us .node-assignment { background: #dbeafe; color: #1e40af; }
  .node.loc-us.level-0 {
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    color: white;
    border-left-color: #1e3a5f;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .node.loc-us.level-0 .node-id { color: rgba(255,255,255,0.6); }
  .node.loc-us.level-0 .node-title { color: rgba(255,255,255,0.8); }
  .node.loc-us.level-0 .node-assignment { background: rgba(255,255,255,0.2); color: white; }
  .node.loc-us.level-0 .count-badge { background: rgba(255,255,255,0.25); color: white; }
  .node.loc-us.level-1 { border-left-color: #2563eb; }
  .node.loc-us.level-2 { border-left-color: #3b82f6; }
  .node.loc-us.level-3 { border-left-color: #60a5fa; }
  .node.loc-us.level-4 { border-left-color: #93c5fd; }
  .node.loc-us.level-5, .node.loc-us.level-6 { border-left-color: #bfdbfe; }

  /* India = Orange */
  .node.loc-india {
    background: #fff7ed;
    border-left-color: #f97316;
    box-shadow: 0 1px 4px rgba(249,115,22,0.1);
  }
  .node.loc-india:hover { box-shadow: 0 4px 16px rgba(249,115,22,0.18); }
  .node.loc-india .node-title { color: #9a7a5a; }
  .node.loc-india .node-assignment { background: #ffedd5; color: #9a3412; }
  .node.loc-india.level-1 { border-left-color: #ea580c; }
  .node.loc-india.level-2 { border-left-color: #f97316; }
  .node.loc-india.level-3 { border-left-color: #fb923c; }
  .node.loc-india.level-4 { border-left-color: #fdba74; }
  .node.loc-india.level-5, .node.loc-india.level-6 { border-left-color: #fed7aa; }

  .node.vacant { opacity: 0.5; border-left-style: dashed; }

  .loc-badge {
    font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.5px; flex-shrink: 0;
    text-transform: uppercase;
  }
  .badge-us { background: #3b82f6; color: white; }
  .badge-india { background: #f97316; color: white; }
  .node.loc-us.level-0 .badge-us { background: rgba(255,255,255,0.25); }

  .node-info { display: flex; flex-direction: column; gap: 1px; }
  .node-name { font-weight: 600; font-size: 13px; line-height: 1.3; }
  .node-id { font-size: 10px; color: #a0aec0; line-height: 1.3; font-weight: 500; }
  .node-title { font-size: 11px; line-height: 1.3; }
  .node-assignment {
    display: inline-block;
    font-size: 9px; font-weight: 600;
    padding: 1px 6px; border-radius: 3px;
    letter-spacing: 0.3px; margin-top: 2px;
    width: fit-content;
  }

  .toggle-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 2px solid #d0d5dd;
    color: #718096;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    transition: all 0.2s;
    line-height: 1;
    flex-shrink: 0; margin-left: 4px;
  }
  .toggle-btn:hover { background: #f0f0f0; border-color: #a0aec0; }

  .count-badge {
    font-size: 10px;
    background: #e2e8f0; color: #4a5568;
    padding: 1px 6px; border-radius: 8px;
    margin-left: 4px; font-weight: 600;
  }

  .collapsed > ul { display: none; }

  .hidden { display: none !important; }

  /* ===== EDITABLE ===== */
  .node-info [contenteditable] {
    cursor: text;
    border-bottom: 1px dashed rgba(0,0,0,0.2);
    outline: none;
    min-width: 30px;
    border-radius: 2px;
  }
  .node-info [contenteditable]:focus {
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 2px #3b82f6;
    border-bottom-color: transparent;
    color: #1a202c;
    padding: 0 3px;
  }
  .node-info [contenteditable]:hover:not(:focus) {
    background: rgba(255,255,255,0.4);
  }

  /* ===== DRAG & DROP ===== */
  .node[draggable="true"] { cursor: grab; }
  .node[draggable="true"]:active { cursor: grabbing; }
  .node.drag-over-target {
    box-shadow: 0 0 0 3px #10b981, 0 4px 16px rgba(16,185,129,0.35) !important;
  }
  .node.dragging { opacity: 0.4; }
  .edit-hint {
    font-size: 11px; color: rgba(255,255,255,0.5);
    margin-left: 12px;
  }
  .controls button:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .controls button:disabled:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="header">
  <h1>Org Chart Builder</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> US</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> India</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e2e8f0;border:2px dashed #a0aec0"></div> Vacant</div>
  </div>
  <div class="controls" id="chartControls" class="hidden">
    <input type="text" class="search-box" placeholder="Search name, ID, title, assignment..." id="searchInput" />
    <button id="undoBtn" onclick="undo()" disabled>Undo</button>
    <button id="redoBtn" onclick="redo()" disabled>Redo</button>
    <button onclick="expandAll()">Expand All</button>
    <button onclick="collapseAll()">Collapse All</button>
    <button onclick="downloadPNG()">Download PNG</button>
    <button onclick="downloadHTML()">Download HTML</button>
    <button onclick="exportExcel()">Export Excel</button>
    <button class="reload-btn" onclick="showUpload()">&#8635; Upload New File</button>
    <span class="edit-hint">Double-click to edit &middot; Drag to move</span>
  </div>
</div>

<div class="stats-bar hidden" id="statsBar"></div>

<!-- Upload Screen -->
<div class="upload-wrapper" id="uploadScreen">
  <div class="upload-zone" id="dropZone">
    <div class="upload-icon">&#128202;</div>
    <h2>Upload Your Org Chart</h2>
    <p>Drop your Excel file here, or click to browse.<br>The chart will be generated instantly.</p>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose Excel File</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
    <div class="upload-hint">
      Expected columns: <code>Name</code> <code>Title</code> <code>Location</code> <code>Reports To</code> <code>Employee ID</code> (optional) <code>Assignment</code> (optional)
    </div>
  </div>
</div>

<!-- Chart Screen -->
<div class="hidden" id="chartScreen">
  <div id="errorArea"></div>
  <div class="chart-container">
    <div class="tree" id="orgTree"></div>
  </div>
</div>

<script>
// ===== GLOBAL STATE =====
let chartRoot = null;
let chartData = [];
const nodeMap = {};

// ===== UNDO / REDO =====
const undoStack = [];
const redoStack = [];
const MAX_HISTORY = 50;

function snapshotData() {
  return chartData.map(d => ({ name: d.name, title: d.title, loc: d.loc, reportsTo: d.reportsTo, empId: d.empId, assign: d.assign }));
}

function restoreSnapshot(snap) {
  snap.forEach((s, i) => {
    chartData[i].name = s.name;
    chartData[i].title = s.title;
    chartData[i].loc = s.loc;
    chartData[i].reportsTo = s.reportsTo;
    chartData[i].empId = s.empId;
    chartData[i].assign = s.assign;
  });
  rebuildTree();
}

function pushUndo() {
  undoStack.push(snapshotData());
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack.length = 0;
  updateUndoRedoButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(snapshotData());
  restoreSnapshot(undoStack.pop());
  updateUndoRedoButtons();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(snapshotData());
  restoreSnapshot(redoStack.pop());
  updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

// ===== FILE HANDLING =====
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
dropZone.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') fileInput.click();
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      buildChart(rows);
    } catch (err) {
      showError('Failed to parse the file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showError(msg) {
  document.getElementById('errorArea').innerHTML = `<div class="error-msg">${msg}</div>`;
}

function showUpload() {
  document.getElementById('uploadScreen').classList.remove('hidden');
  document.getElementById('chartScreen').classList.add('hidden');
  document.getElementById('chartControls').classList.add('hidden');
  document.getElementById('statsBar').classList.add('hidden');
  document.getElementById('errorArea').innerHTML = '';
  document.getElementById('searchInput').value = '';
  fileInput.value = '';
  chartRoot = null;
  chartData = [];
  undoStack.length = 0;
  redoStack.length = 0;
  updateUndoRedoButtons();
}

// ===== CHART BUILDER =====
function buildChart(rows) {
  const colMap = {};
  if (rows.length === 0) { showError('The file appears to be empty.'); return; }
  const rawCols = Object.keys(rows[0]);
  rawCols.forEach(c => {
    const key = c.toLowerCase().replace(/[\s_]/g, '');
    if (key === 'name') colMap.name = c;
    else if (key === 'title') colMap.title = c;
    else if (key === 'location') colMap.location = c;
    else if (key === 'reportsto' || key === 'reportingto' || key === 'manager') colMap.reportsTo = c;
    else if (key === 'employeeid' || key === 'empid' || key === 'eid' || key === 'id') colMap.empId = c;
    else if (key === 'assignment' || key === 'assignments') colMap.assignment = c;
  });

  if (!colMap.name || !colMap.title || !colMap.location || !colMap.reportsTo) {
    showError('Missing required columns. Expected: Name, Title, Location, Reports To. Found: ' + rawCols.join(', '));
    return;
  }

  chartData = rows.map((r, i) => ({
    name: String(r[colMap.name] || '').trim(),
    title: String(r[colMap.title] || '').trim(),
    loc: String(r[colMap.location] || '').trim(),
    reportsTo: String(r[colMap.reportsTo] || '').trim() || null,
    empId: colMap.empId ? String(r[colMap.empId] || '').trim() : '',
    assign: colMap.assignment ? String(r[colMap.assignment] || '').trim() : '',
    _key: '',
    children: [],
    _desc: 0,
    _parent: null
  }));

  rebuildTree();

  document.getElementById('uploadScreen').classList.add('hidden');
  document.getElementById('chartScreen').classList.remove('hidden');
  document.getElementById('chartControls').classList.remove('hidden');
  document.getElementById('statsBar').classList.remove('hidden');
  document.getElementById('errorArea').innerHTML = '';
}

function rebuildTree() {
  // Reset children
  chartData.forEach(p => { p.children = []; p._parent = null; });

  // Keys + lookups
  const byName = {};
  const byTitle = {};
  let vacantIdx = 0;
  Object.keys(nodeMap).forEach(k => delete nodeMap[k]);

  chartData.forEach((p, i) => {
    p._key = (p.name === 'Vacant' || p.name === '') ? 'vacant_' + (vacantIdx++) : p.name + '_' + i;
    nodeMap[p._key] = p;
    if (p.name && p.name !== 'Vacant') byName[p.name] = p;
    if (p.title) byTitle[p.title] = p;
  });

  chartRoot = null;
  const orphans = [];
  chartData.forEach(p => {
    if (!p.reportsTo) { chartRoot = p; return; }
    const parent = byName[p.reportsTo] || byTitle[p.reportsTo];
    if (parent) { parent.children.push(p); p._parent = parent; }
    else orphans.push(p);
  });

  if (!chartRoot) { showError('Could not find the root node.'); return; }
  orphans.forEach(o => { chartRoot.children.push(o); o._parent = chartRoot; });

  function countDesc(node) {
    let c = 0;
    node.children.forEach(ch => { c += 1 + countDesc(ch); });
    node._desc = c;
    return c;
  }
  countDesc(chartRoot);

  renderStats();
  renderTree();
}

function renderStats() {
  const total = chartData.length;
  const vacant = chartData.filter(d => d.name === 'Vacant' || d.name === '').length;
  const locations = {};
  chartData.forEach(d => { locations[d.loc] = (locations[d.loc] || 0) + 1; });
  const assignments = [...new Set(chartData.map(d => d.assign).filter(a => a))];

  let statsHtml =
    `<div class="stat"><strong>${total}</strong> Total Positions</div>` +
    `<div class="stat"><strong>${total - vacant}</strong> Filled</div>` +
    `<div class="stat"><strong>${vacant}</strong> Vacant</div>`;
  Object.entries(locations).forEach(([loc, cnt]) => {
    const color = loc === 'US' ? '#3b82f6' : loc === 'India' ? '#f97316' : '#718096';
    statsHtml += `<div class="stat" style="color:${color}"><strong>${cnt}</strong> ${loc}</div>`;
  });
  if (assignments.length) statsHtml += `<div class="stat"><strong>${assignments.length}</strong> Assignments</div>`;
  document.getElementById('statsBar').innerHTML = statsHtml;
}

function renderTree() {
  if (!chartRoot) return;
  // Save collapsed state
  const collapsedKeys = new Set();
  document.querySelectorAll('.tree-li.collapsed').forEach(li => collapsedKeys.add(li.dataset.key));

  document.getElementById('orgTree').innerHTML = `<ul>${renderNode(chartRoot, 0, collapsedKeys)}</ul>`;
  setupDragAndDrop();
}

function renderNode(node, level, collapsedKeys) {
  const isVacant = node.name === 'Vacant' || node.name === '';
  const hasChildren = node.children.length > 0;
  const isUS = node.loc === 'US';
  const locCls = isUS ? 'loc-us' : 'loc-india';
  const badgeCls = isUS ? 'badge-us' : 'badge-india';
  const isCollapsed = collapsedKeys && collapsedKeys.has(node._key);

  let html = `<li class="tree-li${isCollapsed ? ' collapsed' : ''}" data-key="${node._key}">`;
  html += `<div class="node ${locCls} level-${Math.min(level,6)} ${isVacant ? 'vacant' : ''}" draggable="true" data-key="${node._key}" data-name="${node.name.toLowerCase()}" data-title="${node.title.toLowerCase()}" data-assign="${(node.assign||'').toLowerCase()}" data-empid="${(node.empId||'').toLowerCase()}">`;
  html += `<span class="loc-badge ${badgeCls}">${node.loc}</span>`;
  html += `<div class="node-info">`;
  html += `<span class="node-name" data-field="name">${node.name || 'Vacant'}${node._desc > 0 ? ` <span class="count-badge">${node._desc}</span>` : ''}</span>`;
  if (node.empId) html += `<span class="node-id" data-field="empId">${node.empId}</span>`;
  html += `<span class="node-title" data-field="title">${node.title}</span>`;
  if (node.assign) html += `<span class="node-assignment" data-field="assign">${node.assign}</span>`;
  html += `</div>`;
  if (hasChildren) html += `<span class="toggle-btn" onclick="toggleNode(this)">${isCollapsed ? '+' : '&#8722;'}</span>`;
  html += `</div>`;

  if (hasChildren) {
    html += `<ul>`;
    node.children.forEach(ch => { html += renderNode(ch, level + 1, collapsedKeys); });
    html += `</ul>`;
  }
  html += `</li>`;
  return html;
}

// ===== INLINE EDITING =====
document.getElementById('orgTree').addEventListener('dblclick', function(e) {
  const span = e.target.closest('[data-field]');
  if (!span) return;
  const nodeEl = span.closest('.node');
  if (!nodeEl) return;
  const key = nodeEl.dataset.key;
  const node = nodeMap[key];
  if (!node) return;
  const field = span.dataset.field;

  // Remove count badge from name before editing
  const badge = span.querySelector('.count-badge');
  if (badge) badge.remove();

  const currentVal = node[field] || '';
  span.textContent = currentVal;
  span.contentEditable = true;
  span.focus();

  // Select all text
  const range = document.createRange();
  range.selectNodeContents(span);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function commit() {
    span.contentEditable = false;
    const newVal = span.textContent.trim();
    if (newVal !== currentVal) {
      pushUndo();
      node[field] = newVal;
      // Update reportsTo references if name changed
      if (field === 'name') {
        chartData.forEach(d => {
          if (d.reportsTo === currentVal) d.reportsTo = newVal;
        });
      }
      rebuildTree();
    } else {
      renderTree();
    }
  }

  span.addEventListener('blur', commit, { once: true });
  span.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); span.blur(); }
    if (ev.key === 'Escape') { span.textContent = currentVal; span.contentEditable = false; renderTree(); }
  });
});

// ===== DRAG & DROP =====
let dragKey = null;

function setupDragAndDrop() {
  document.querySelectorAll('.node[draggable]').forEach(nodeEl => {
    nodeEl.addEventListener('dragstart', e => {
      dragKey = nodeEl.dataset.key;
      nodeEl.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragKey);
    });
    nodeEl.addEventListener('dragend', () => {
      nodeEl.classList.remove('dragging');
      document.querySelectorAll('.drag-over-target').forEach(n => n.classList.remove('drag-over-target'));
      dragKey = null;
    });
    nodeEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (nodeEl.dataset.key !== dragKey) nodeEl.classList.add('drag-over-target');
    });
    nodeEl.addEventListener('dragleave', () => {
      nodeEl.classList.remove('drag-over-target');
    });
    nodeEl.addEventListener('drop', e => {
      e.preventDefault();
      nodeEl.classList.remove('drag-over-target');
      const targetKey = nodeEl.dataset.key;
      if (!dragKey || dragKey === targetKey) return;

      const dragNode = nodeMap[dragKey];
      const targetNode = nodeMap[targetKey];
      if (!dragNode || !targetNode) return;

      // Prevent dropping a parent onto its own descendant
      function isDescendant(parent, child) {
        for (const ch of parent.children) {
          if (ch._key === child._key || isDescendant(ch, child)) return true;
        }
        return false;
      }
      if (isDescendant(dragNode, targetNode)) return;

      pushUndo();
      // Remove from old parent
      if (dragNode._parent) {
        dragNode._parent.children = dragNode._parent.children.filter(c => c._key !== dragKey);
      }
      // Update reportsTo
      dragNode.reportsTo = targetNode.name || targetNode.title;
      // Add to new parent
      targetNode.children.push(dragNode);
      dragNode._parent = targetNode;

      rebuildTree();
    });
  });
}

// ===== TREE CONTROLS =====
function toggleNode(btn) {
  const li = btn.closest('.tree-li');
  li.classList.toggle('collapsed');
  btn.innerHTML = li.classList.contains('collapsed') ? '+' : '&#8722;';
}

function expandAll() {
  document.querySelectorAll('.tree-li.collapsed').forEach(li => {
    li.classList.remove('collapsed');
    const btn = li.querySelector(':scope > .node > .toggle-btn');
    if (btn) btn.innerHTML = '&#8722;';
  });
}

function collapseAll() {
  document.querySelectorAll('.tree-li').forEach(li => {
    if (li.querySelector(':scope > ul')) {
      li.classList.add('collapsed');
      const btn = li.querySelector(':scope > .node > .toggle-btn');
      if (btn) btn.textContent = '+';
    }
  });
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.node').forEach(n => n.classList.remove('highlight'));
  if (!q) return;
  expandAll();
  document.querySelectorAll('.node').forEach(n => {
    if (n.dataset.name.includes(q) || n.dataset.title.includes(q) || n.dataset.assign.includes(q) || n.dataset.empid.includes(q)) {
      n.classList.add('highlight');
      n.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
});

// ===== EXPORT EXCEL =====
function exportExcel() {
  const rows = [];
  function flatten(node) {
    rows.push({
      'Name': node.name,
      'Employee ID': node.empId,
      'Title': node.title,
      'Location': node.loc,
      'Reports To': node.reportsTo || '',
      'Assignment': node.assign
    });
    node.children.forEach(flatten);
  }
  flatten(chartRoot);

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Org Chart');
  XLSX.writeFile(wb, 'org-chart.xlsx');
}

// ===== DOWNLOAD =====
function downloadPNG() {
  const chart = document.querySelector('.chart-container');
  const collapsed = document.querySelectorAll('.tree-li.collapsed');
  const wasCollapsed = [...collapsed];
  expandAll();

  html2canvas(chart, {
    backgroundColor: '#f5f6f8',
    scale: 2,
    scrollX: 0,
    scrollY: 0,
    windowWidth: chart.scrollWidth,
    windowHeight: chart.scrollHeight
  }).then(canvas => {
    wasCollapsed.forEach(li => {
      li.classList.add('collapsed');
      const btn = li.querySelector(':scope > .node > .toggle-btn');
      if (btn) btn.textContent = '+';
    });
    const link = document.createElement('a');
    link.download = 'org-chart.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(() => {
    wasCollapsed.forEach(li => {
      li.classList.add('collapsed');
      const btn = li.querySelector(':scope > .node > .toggle-btn');
      if (btn) btn.textContent = '+';
    });
    alert('Failed to generate image. Try with a smaller chart or fewer expanded nodes.');
  });
}
